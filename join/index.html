<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join — SquadManager Pro</title>
  <link rel="icon" type="image/png" href="../images/icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #1B5E20;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 800;
      color: #1B5E20;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .code-box {
      background: #f5f7f5;
      border: 2px solid #4CAF50;
      border-radius: 10px;
      padding: 16px 24px;
      margin-bottom: 28px;
    }
    .code-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #2E7D32;
      margin-bottom: 8px;
    }
    .code-value {
      font-size: 2rem;
      font-weight: 900;
      font-family: "SF Mono", "Fira Code", "Courier New", monospace;
      letter-spacing: 6px;
      color: #1a1a1a;
    }
    .open-btn {
      display: block;
      width: 100%;
      padding: 15px 24px;
      background: #2E7D32;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 16px;
      transition: background 0.2s;
    }
    .open-btn:hover { background: #1B5E20; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #aaa;
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }
    .manual-instructions {
      font-size: 0.88rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .manual-instructions strong { color: #1a1a1a; }
    .store-links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .store-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      text-decoration: none;
      color: #333;
      font-size: 0.85rem;
      font-weight: 600;
      transition: border-color 0.2s, background 0.2s;
    }
    .store-link:hover { border-color: #2E7D32; background: #f5f7f5; }
    .no-code {
      font-size: 0.95rem;
      color: #666;
      line-height: 1.6;
    }
    #status-msg {
      font-size: 0.82rem;
      color: #888;
      margin-top: 8px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="../images/icon.png" alt="SquadManager Pro" />
    <h1>You've been invited!</h1>
    <p class="subtitle" id="subtitle">Tap below to open SquadManager Pro and accept your invitation.</p>

    <div id="main-content">
      <!-- Populated by JS -->
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const APP_SCHEME = 'squadmanagerpro';
    const mainEl = document.getElementById('main-content');

    if (code) {
      const deepLink = APP_SCHEME + '://join?code=' + code;

      mainEl.innerHTML =
        '<div class="code-box">' +
          '<div class="code-label">Your Invite Code</div>' +
          '<div class="code-value">' + code + '</div>' +
        '</div>' +
        '<button class="open-btn" id="open-btn">Open SquadManager Pro</button>' +
        '<p id="status-msg"></p>' +
        '<div class="divider">App not opening?</div>' +
        '<p class="manual-instructions">' +
          'Open <strong>SquadManager Pro</strong>, tap <strong>Enter Invite Code</strong> ' +
          'on the home screen, and enter the code shown above.' +
        '</p>' +
        '<div class="divider">Don\'t have the app yet?</div>' +
        '<div class="store-links">' +
          '<a href="https://apps.apple.com/app/squadmanager-pro/id6761607447" class="store-link" target="_blank">' +
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>' +
            'App Store' +
          '</a>' +
          '<a href="https://play.google.com/store/apps/details?id=com.squadmanagerpro" class="store-link" target="_blank">' +
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3.18 23.76c.3.17.64.22.99.14l12.49-7.18-2.79-2.79-10.69 9.83zM.54 1.1C.2 1.46 0 2.02 0 2.73v18.54c0 .71.2 1.27.54 1.63l.08.08 10.38-10.38v-.24L.62 1.02l-.08.08zM20.12 10.5l-2.67-1.54-3.12 3.12 3.12 3.12 2.69-1.55c.77-.44.77-1.16-.02-1.61v-.54zM4.17.24L16.66 7.42l-2.79 2.79L3.18.38C3.48.21 3.87.18 4.17.24z"/></svg>' +
            'Google Play' +
          '</a>' +
        '</div>';

      document.getElementById('open-btn').addEventListener('click', function () {
        const statusEl = document.getElementById('status-msg');
        statusEl.textContent = 'Opening app…';
        window.location.href = deepLink;
        // If the app didn't open after 2.5s, show a helpful message
        setTimeout(function () {
          statusEl.textContent = 'App didn\'t open? Use the invite code above or download the app below.';
        }, 2500);
      });
    } else {
      document.getElementById('subtitle').textContent =
        'This link appears to be missing your invite code. Please check the email and try again, or enter your code manually in the app.';
      mainEl.innerHTML =
        '<p class="no-code">If you have a code, open SquadManager Pro and tap <strong>Enter Invite Code</strong> on the home screen.</p>';
    }
  </script>
</body>
</html>
